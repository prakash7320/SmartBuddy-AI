<!DOCTYPE html>
<html>
<head>
    <title>SmartBuddy AI</title>
    <link rel="icon" href="logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

    <!-- Title -->
    <h1 id="title" class="text-center mt-5 text-secondary">
        What You Learn Today!
    </h1>

    <!-- Chat Box -->
    <div id="chatBox" class="mx-auto mt-4 p-3 bg-white rounded"
         style="display:none; max-width:700px; height:400px; overflow-y:auto;">

    </div>

    <!-- Input Area -->
    <div class="position-fixed bottom-0 start-50 translate-middle-x mb-3 w-100"
         style="max-width:700px;">

        <div class="d-flex align-items-center p-2 bg-white rounded-pill">

            <!-- Upload -->
            <label for="imageInput" class="me-2">📷</label>
            <input type="file" id="imageInput" hidden>
            <button onclick="getNews()" class="news-btn">🌍</button>
            <button id="micBtn">🎤</button>

            <!-- Preview -->
            <img id="preview" class="me-2">

            <!-- Input -->
            <input type="text" id="textInput"
                   class="form-control border-0 shadow-none"
                   placeholder="Ask something...">

            <!-- Send -->
            <button onclick="sendMessage()" class="btn btn-light rounded-circle ms-2">
                ➤
            </button>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
